name: Release
on:
  push:
    branches:
      - main
  # Allows re-triggering a release whose publish failed (e.g. run 30050778519).
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
  queue: max
permissions:
  id-token: write
  contents: write
jobs:
  release:
    uses: WillBooster/reusable-workflows/.github/workflows/release.yml@main
    with:
      github_hosted_runner: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAKUMI_GUARD_TOKEN: ${{ secrets.TAKUMI_GUARD_TOKEN }}
      VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
